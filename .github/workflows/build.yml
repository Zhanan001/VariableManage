name: Gradle Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build (Gradle)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # Install a specific Gradle version on the runner and run the build.
      # This avoids needing a gradlew file in the repo.
      - name: Install Gradle and build
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.3'    # <- choose the Gradle version your project requires
          arguments: build --no-daemon

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: VariableManage-jar
          path: build/libs/*.jar
